<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What is New? | واجهتك للأخبار</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* 🎨 لوحة الألوان والتنسيق */
    :root {
      --accent: #3b82f6;
      --bg: #f0f2f5;
      --card: #ffffff;
      --text: #1c1e21;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--bg);
      font-family: 'Cairo', sans-serif;
      padding: 40px 20px;
      color: var(--text);
    }

    /* العنوان */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    h1 { font-size: 3.5rem; font-weight: 900; color: #1e293b; margin-bottom: 10px; }
    .subtitle { color: #64748b; font-size: 1.1rem; }

    /* زر التحكم */
    .btn-container { text-align: center; margin-bottom: 50px; }
    
    #fetchBtn {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white; border: none; padding: 18px 40px;
      font-size: 1.2rem; font-weight: 700; border-radius: 15px;
      cursor: pointer; transition: 0.3s;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
    }

    #fetchBtn:hover { transform: translateY(-3px); box-shadow: 0 15px 30px rgba(37, 99, 235, 0.3); }
    #fetchBtn:disabled { background: #cbd5e1; cursor: not-allowed; transform: none; }

    /* شبكة الأخبار */
    #news-container {
      max-width: 1000px; margin: 0 auto;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
    }

    /* كرت الخبر */
    .news-card {
      background: var(--card); border-radius: 20px; overflow: hidden;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.4s;
      display: flex; flex-direction: column;
      animation: fadeInUp 0.5s ease backwards;
    }

    .news-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

    .news-img { width: 100%; height: 200px; object-fit: cover; background: #e2e8f0; }

    .news-body { padding: 25px; flex-grow: 1; display: flex; flex-direction: column; }

    .source-tag { 
      background: #eff6ff; color: #1d4ed8; padding: 4px 12px; 
      border-radius: 8px; font-size: 0.75rem; font-weight: 700;
      align-self: flex-start; margin-bottom: 12px;
    }

    .news-title { font-size: 1.2rem; font-weight: 700; line-height: 1.5; margin-bottom: 15px; }
    .news-title a { text-decoration: none; color: inherit; transition: 0.2s; }
    .news-title a:hover { color: var(--accent); }

    .news-footer { 
      margin-top: auto; padding-top: 15px; border-top: 1px solid #f1f5f9;
      font-size: 0.8rem; color: #94a3b8; display: flex; justify-content: space-between;
    }

    /* رسائل الخطأ */
    .error-box {
      grid-column: 1 / -1; background: #fff1f2; color: #be123c;
      padding: 30px; border-radius: 15px; text-align: center; border: 1px solid #fecaca;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>What is New? 🌍</h1>
    <p class="subtitle">أحدث الأخبار العالمية بين يديك في ثوانٍ</p>
  </div>

  <div class="btn-container">
    <button id="fetchBtn" onclick="fetchNews()">✨ جلب الأخبار الآن</button>
  </div>

  <div id="news-container">
    </div>

  <script>
    const API_KEY = "55e30d5c653ea217c8bc9d69e4225099";

    async function fetchNews() {
      const btn = document.getElementById("fetchBtn");
      const container = document.getElementById("news-container");

      btn.disabled = true;
      btn.innerHTML = "⏳ جاري جلب القصص...";
      container.innerHTML = "";

      try {
        // استخدمنا هنا وسيطاً مختلفاً تماماً (Cloudflare Worker Proxy) أكثر استقراراً
        const targetUrl = `https://gnews.io/api/v4/top-headlines?category=general&lang=ar&max=10&apikey=${API_KEY}`;
        
        // محاولة جلب مباشرة أولاً، إذا فشلت ننتقل للبروكسي
        let response;
        try {
            response = await fetch(targetUrl);
        } catch(e) {
            const proxy = "https://api.allorigins.win/get?url=";
            const resProxy = await fetch(proxy + encodeURIComponent(targetUrl));
            const jsonProxy = await resProxy.json();
            response = { ok: true, json: () => JSON.parse(jsonProxy.contents) };
        }

        const data = await response.json();

        if (data.errors) throw new Error(data.errors[0]);

        if (!data.articles?.length) {
          container.innerHTML = `<div class="error-box">😕 لم نجد أخباراً جديدة حالياً.</div>`;
        } else {
          data.articles.forEach((article, i) => {
            const card = document.createElement("div");
            card.className = "news-card";
            card.style.animationDelay = (i * 0.1) + "s";
            card.innerHTML = `
              ${article.image ? `<img src="${article.image}" class="news-img" onerror="this.src='https://via.placeholder.com/400x200?text=No+Image'">` : ""}
              <div class="news-body">
                <span class="source-tag">${article.source.name}</span>
                <h3 class="news-title"><a href="${article.url}" target="_blank">${article.title}</a></h3>
                <div class="news-footer">
                  <span>📅 ${new Date(article.publishedAt).toLocaleDateString('ar-EG')}</span>
                  <span>⏰ ${getTimeAgo(new Date(article.publishedAt))}</span>
                </div>
              </div>
            `;
            container.appendChild(card);
          });
        }
      } catch (err) {
        container.innerHTML = `<div class="error-box">❌ <strong>فشل في جلب البيانات:</strong> ${err.message}<br>تأكد من حصة الـ API اليومية أو جرب الاتصال من شبكة أخرى.</div>`;
      } finally {
        btn.disabled = false;
        btn.innerHTML = "🔄 تحديث القائمة";
      }
    }

    function getTimeAgo(date) {
      const diff = Math.floor((new Date() - date) / 60000);
      if (diff < 1) return "الآن";
      if (diff < 60) return `منذ ${diff} دقيقة`;
      const hours = Math.floor(diff / 60);
      if (hours < 24) return `منذ ${hours} ساعة`;
      return `منذ ${Math.floor(hours / 24)} يوم`;
    }
  </script>
</body>
</html>
