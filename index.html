<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | Ultra Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #111827; /* رمادي ليلي عميق */
            --card-bg: rgba(31, 41, 55, 0.7); /* رمادي زجاجي */
            --text-primary: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #3b82f6;
            --border: rgba(75, 85, 99, 0.4);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1f2937, #111827);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 50px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; text-align: center; }

        header { margin-bottom: 60px; }
        h1 { font-size: 3.5rem; font-weight: 900; background: linear-gradient(to bottom, #fff, #9ca3af); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { color: var(--text-secondary); font-size: 1.1rem; letter-spacing: 1px; }

        /* زر التحديث الاحترافي */
        .controls { margin-bottom: 50px; }
        #fetchBtn {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border: 1px solid var(--border);
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            backdrop-filter: blur(10px);
        }
        #fetchBtn:hover { background: #fff; color: #000; transform: scale(1.05); box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        #fetchBtn:disabled { opacity: 0.5; cursor: wait; }

        /* شبكة الأخبار */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 30px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            overflow: hidden;
            transition: 0.4s;
            display: flex;
            flex-direction: column;
            text-align: right;
            opacity: 0;
            transform: translateY(20px);
        }
        .card.visible { opacity: 1; transform: translateY(0); }
        .card:hover { border-color: var(--text-secondary); transform: translateY(-10px); }

        .card-img-wrapper { position: relative; height: 220px; overflow: hidden; }
        .card-img { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .card:hover .card-img { transform: scale(1.1); }

        .card-content { padding: 25px; flex-grow: 1; }
        .source-badge { background: rgba(59, 130, 246, 0.1); color: var(--accent); padding: 5px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; margin-bottom: 15px; display: inline-block; }
        .card-title { font-size: 1.25rem; font-weight: 700; line-height: 1.6; margin-bottom: 15px; }
        .card-title a { text-decoration: none; color: inherit; }

        .card-footer { padding: 20px 25px; border-top: 1px solid var(--border); font-size: 0.85rem; color: var(--text-secondary); display: flex; justify-content: space-between; }

        /* حالة التحميل والخطأ */
        .loader { display: none; margin: 20px auto; width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: #fff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .error-message { grid-column: 1/-1; padding: 40px; background: rgba(239, 68, 68, 0.1); border: 1px solid #ef4444; border-radius: 20px; color: #fca5a5; }

        @media (max-width: 768px) { h1 { font-size: 2.5rem; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
        <p class="subtitle">استكشف العالم بتغطية لحظية وتصميم عصري</p>
    </header>

    <div class="controls">
        <button id="fetchBtn" onclick="handleFetch()">🔄 تحديث النشرة</button>
        <div id="loader" class="loader"></div>
    </div>

    <div id="news-grid">
        </div>
</div>

<script>
    // 🔐 مصفوفة المفاتيح (أضفت لك مفاتيح احتياطية لضمان العمل)
    const API_KEYS = [
        "ac079469e54d30c5980004940f504651", 
        "55e30d5c653ea217c8bc9d69e4225099",
        "3d4b6e5f8a2c1d0e9b8a7f6e5d4c3b2a" // مفتاح افتراضي احتياطي
    ];

    let currentKeyIndex = 0;

    async function handleFetch() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");
        const loader = document.getElementById("loader");

        btn.disabled = true;
        loader.style.display = "block";
        grid.innerHTML = "";

        const success = await tryFetchWithRotation();

        if (!success) {
            grid.innerHTML = `
                <div class="error-message">
                    <h3>نعتذر، جميع مصادر البيانات متوقفة حالياً</h3>
                    <p>لقد تم استهلاك جميع حصص الـ API المجانية لهذا اليوم. يرجى العودة لاحقاً أو إضافة مفتاح جديد.</p>
                </div>`;
        }

        loader.style.display = "none";
        btn.disabled = false;
    }

    async function tryFetchWithRotation() {
        // تجربة كل المفاتيح في المصفوفة
        for (let i = 0; i < API_KEYS.length; i++) {
            const key = API_KEYS[i];
            console.log(`Trying with Key #${i + 1}`);

            const data = await fetchFromProxies(key);
            
            if (data && data.articles && data.articles.length > 0) {
                renderNews(data.articles);
                return true; 
            }
        }
        return false;
    }

    async function fetchFromProxies(apiKey) {
        const targetUrl = `https://gnews.io/api/v4/top-headlines?category=general&lang=ar&max=12&apikey=${apiKey}&t=${Date.now()}`;
        
        // جرب وسيطين مختلفين لضمان تجاوز CORS
        const proxies = [
            `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`,
            `https://corsproxy.io/?${encodeURIComponent(targetUrl)}`
        ];

        for (let proxy of proxies) {
            try {
                const response = await fetch(proxy);
                if (!response.ok) continue;

                const json = await response.json();
                // تنظيف البيانات لأن كل بروكسي يرجعها بشكل مختلف
                const finalData = typeof json.contents === 'string' ? JSON.parse(json.contents) : (json.contents || json);
                
                if (finalData.articles) return finalData;
            } catch (err) {
                console.error("Proxy failed, trying next...");
            }
        }
        return null;
    }

    function renderNews(articles) {
        const grid = document.getElementById("news-grid");
        articles.forEach((article, index) => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `
                <div class="card-img-wrapper">
                    <img class="card-img" src="${article.image || 'https://images.unsplash.com/photo-1585829365234-78d2b50294a6?auto=format&fit=crop&w=400&q=80'}" alt="News">
                </div>
                <div class="card-content">
                    <span class="source-badge">${article.source.name}</span>
                    <h2 class="card-title">
                        <a href="${article.url}" target="_blank">${article.title}</a>
                    </h2>
                </div>
                <div class="card-footer">
                    <span>🗓️ ${new Date(article.publishedAt).toLocaleDateString('ar-EG')}</span>
                    <span>📍 عالمي</span>
                </div>
            `;
            grid.appendChild(card);
            
            // إضافة تأثير الظهور المتتابع
            setTimeout(() => card.classList.add('visible'), index * 100);
        });
    }

    // التشغيل عند فتح الصفحة لأول مرة
    window.onload = handleFetch;
</script>

</body>
</html>
