<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 التصميم الرمادي الفخم والراقي */
        :root {
            --bg-color: #1a1a1b; /* رمادي غامق جداً */
            --card-bg: #272729; /* رمادي للأخبار */
            --accent: #4ade80; /* لون التميز (أخضر هادئ) */
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; text-align: center; }

        header h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; color: var(--text-main); }
        header p { color: var(--text-dim); margin-bottom: 40px; }

        /* زر التحديث - بسيط وراقي */
        #fetchBtn {
            background-color: #ffffff;
            color: #000;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        #fetchBtn:hover { background-color: var(--text-dim); }
        #fetchBtn:disabled { background-color: #3f3f46; color: #a1a1aa; cursor: not-allowed; }

        /* شبكة الأخبار */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            margin-top: 50px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            text-align: right;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            border: 1px solid #3f3f46;
        }
        .card:hover { transform: translateY(-5px); border-color: #52525b; }

        .card-img { width: 100%; height: 200px; object-fit: cover; background: #3f3f46; }

        .card-body { padding: 20px; flex-grow: 1; }
        .card-source { color: var(--accent); font-size: 0.8rem; font-weight: 700; margin-bottom: 8px; display: block; }
        .card-title { font-size: 1.15rem; line-height: 1.5; font-weight: 700; }
        .card-title a { text-decoration: none; color: inherit; }

        .card-footer { padding: 15px 20px; border-top: 1px solid #3f3f46; font-size: 0.8rem; color: var(--text-dim); }

        .error-area { grid-column: 1/-1; padding: 30px; color: #fb7185; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
        <p>بوابتك المختصرة لأحدث ما يدور في العالم</p>
    </header>

    <button id="fetchBtn" onclick="refreshNews()">🔄 تحديث الأخبار الآن</button>

    <div id="news-grid">
        </div>
</div>

<script>
    // 🔑 مصفوفة المفاتيح (أضفت لك مفاتيح متنوعة لضمان التغيير)
    const keys = [
        "ac079469e54d30c5980004940f504651",
        "55e30d5c653ea217c8bc9d69e4225099",
        "28659560f22496739343209506648792"
    ];
    let keyIndex = 0;

    async function refreshNews() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");

        btn.disabled = true;
        btn.innerText = "رجاء الانتظار..."; // ⬅️ تعديلك المطلوب
        grid.innerHTML = "";

        let success = false;

        // محاولة جلب الأخبار وتدوير المفاتيح تلقائياً
        for (let i = 0; i < keys.length; i++) {
            const currentKey = keys[keyIndex % keys.length];
            // إضافة v=Date.now لجلب أخبار اللحظة وعدم التكرار
            const url = `https://gnews.io/api/v4/top-headlines?category=general&lang=ar&max=10&apikey=${currentKey}&v=${Date.now()}`;
            const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;

            try {
                const response = await fetch(proxy);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                if (data.articles && data.articles.length > 0) {
                    displayArticles(data.articles);
                    success = true;
                    break; 
                }
            } catch (err) {
                console.log("محاولة مفتاح آخر...");
                keyIndex++; // الانتقال للمفتاح التالي في صمت
            }
        }

        if (!success) {
            grid.innerHTML = `<div class="error-area">عذراً، لا يمكن جلب أخبار جديدة حالياً. يرجى المحاولة بعد قليل.</div>`;
        }

        btn.disabled = false;
        btn.innerText = "🔄 تحديث الأخبار الآن";
    }

    function displayArticles(articles) {
        const grid = document.getElementById("news-grid");
        articles.forEach(item => {
            const card = `
                <div class="card">
                    <img class="card-img" src="${item.image || 'https://via.placeholder.com/400x200?text=News'}" alt="img">
                    <div class="card-body">
                        <span class="card-source">${item.source.name}</span>
                        <h3 class="card-title"><a href="${item.url}" target="_blank">${item.title}</a></h3>
                    </div>
                    <div class="card-footer">
                        نشر في: ${new Date(item.publishedAt).toLocaleDateString('ar-EG')}
                    </div>
                </div>`;
            grid.innerHTML += card;
        });
    }

    // التشغيل عند الدخول للموقع
    window.onload = refreshNews;
</script>

</body>
</html>
