
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What is New?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #d1d5db;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #1f2937;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    #fetchBtn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(59,130,246,0.4);
    }

    #fetchBtn:hover { background-color: #2563eb; transform: scale(1.05); }
    #fetchBtn:disabled { background-color: #93c5fd; cursor: not-allowed; transform: none; }

    #status {
      margin-top: 15px;
      font-size: 0.9rem;
      color: #374151;
      min-height: 20px;
    }

    #news-container {
      margin-top: 20px;
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .news-card {
      background: white;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s;
      border-right: 5px solid #3b82f6;
    }

    .news-card:hover { transform: translateY(-3px); }

    .news-image {
      width: 100%;
      max-height: 180px;
      object-fit: cover;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .news-source {
      font-size: 0.75rem;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 8px;
      font-weight: 600;
      background-color: #3b82f6;
    }

    .news-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 6px;
      line-height: 1.5;
    }

    .news-title a {
      text-decoration: none;
      color: inherit;
    }

    .news-title a:hover { color: #2563eb; }

    .news-desc {
      font-size: 0.85rem;
      color: #6b7280;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .news-meta { font-size: 0.8rem; color: #9ca3af; }

    .error-card {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 16px 20px;
      color: #991b1b;
      font-size: 0.9rem;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>

  <h1>📰 What is New?</h1>
  <p class="subtitle">أحدث الأخبار العالمية — مدعوم بـ GNews API</p>

  <button id="fetchBtn" onclick="fetchNews()">🔍 What is New?</button>
  <p id="status"></p>
  <div id="news-container"></div>

  <script>
    // ✅ تأكد أن هذا المفتاح صالح وفعال من موقع gnews.io
    try {
        const url = `https://gnews.io/api/v4/top-headlines?lang=en&max=5&apikey=${API_KEY}`;
        
        // أضفنا timeout بسيط للتأكد من عدم تعليق الطلب
        const res = await fetch(url, { mode: 'cors' }); 
        
        if (!res.ok) {
           const errorData = await res.json();
           throw new Error(errorData.errors ? errorData.errors[0] : `HTTP error! status: ${res.status}`);
        }

        const data = await res.json();
        // ... باقي الكود كما هو
    const API_KEY = "ac079b8cbbc61d5541a20a769bcf4651";

    async function fetchNews() {
      const btn       = document.getElementById("fetchBtn");
      const status    = document.getElementById("status");
      const container = document.getElementById("news-container");

      btn.disabled       = true;
      btn.textContent    = "⏳ جاري التحميل...";
      status.textContent = "";
      container.innerHTML = "";

      try {
        const url = `https://gnews.io/api/v4/top-headlines?lang=en&max=5&apikey=${API_KEY}`;
        const res  = await fetch(url);
        const data = await res.json();

        // فحص حالة الاستجابة
        if (!res.ok) {
           // إذا كان هناك خطأ من الـ API، سنحاول استخراج الرسالة
           const errorMsg = (data.errors && data.errors.length > 0) ? data.errors[0] : "حدث خطأ غير متوقع";
           throw new Error(errorMsg);
        }

        if (!data.articles || data.articles.length === 0) {
          container.innerHTML = `<div class="error-card">😕 لا توجد أخبار متاحة حالياً.</div>`;
          status.textContent = "⚠️ لا يوجد نتائج";
        } else {
          data.articles.forEach(article => {
            const card = document.createElement("div");
            card.className = "news-card";
            card.innerHTML = `
              ${article.image ? `<img class="news-image" src="${article.image}" alt="news" onerror="this.style.display='none'"/>` : ""}
              <span class="news-source">🌐 ${article.source?.name || "مجهول"}</span>
              <div class="news-title">
                <a href="${article.url}" target="_blank" rel="noopener">${article.title}</a>
              </div>
              ${article.description ? `<div class="news-desc">${article.description}</div>` : ""}
              <div class="news-meta">🕐 ${getTimeAgo(new Date(article.publishedAt))}</div>
            `;
            container.appendChild(card);
          });

          status.textContent = `✅ تم جلب ${data.articles.length} أخبار`;
        }

      } catch (err) {
        // عرض رسالة الخطأ بشكل آمن كـ String
        container.innerHTML = `
          <div class="error-card">
            ❌ <strong>خطأ:</strong> ${String(err.message)}<br><br>
            تأكد إن الـ API Key صحيح (ac079...4651) وإن الاتصال شغال. 
            <br> قد تكون تجاوزت الحصة المجانية اليومية.
          </div>`;
        status.textContent = "❌ حدث خطأ";
        console.error("Fetch Error:", err);
      }

      btn.disabled    = false;
      btn.textContent = "🔄 تحديث الأخبار";
    }

    function getTimeAgo(date) {
      if (isNaN(date)) return "غير معروف";
      const diff = Math.floor((new Date() - date) / 60000);
      if (diff < 1)    return "الآن";
      if (diff < 60)   return `منذ ${diff} دقيقة`;
      const hours = Math.floor(diff / 60);
      if (hours < 24) return `منذ ${hours} ساعة`;
      return `منذ ${Math.floor(hours / 24)} يوم`;
    }
  </script>

</body>
</html>
