<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What is New? | أحدث الأخبار</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #2563eb;
      --accent-soft: #eaf2ff;
      --danger: #dc2626;
      --success: #16a34a;
      --radius: 18px;
      --shadow: 0 14px 32px rgba(15, 23, 42, 0.12);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: radial-gradient(circle at top right, #f2f9ff 0%, var(--bg) 55%);
      color: var(--text);
      font-family: 'Cairo', 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 24px 14px 42px;
      line-height: 1.5;
    }

    .page {
      width: min(100%, 1024px);
      display: grid;
      gap: 18px;
    }

    .hero {
      background: linear-gradient(145deg, #ffffffdd, #eff6ff);
      border: 1px solid #dbeafe;
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      padding: 24px 20px;
      animation: fadeInUp 0.35s ease-out;
    }

    .hero h1 {
      font-size: clamp(1.95rem, 2.5vw, 2.8rem);
      margin-bottom: 6px;
    }

    .hero p {
      color: var(--muted);
      margin-bottom: 22px;
      font-size: 1rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: none;
      border-radius: 999px;
      font-weight: 700;
      padding: 12px 20px;
      cursor: pointer;
      transition: all 0.25s ease;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn.primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 8px 22px rgba(37, 99, 235, 0.2);
    }

    .btn.primary:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.02);
      background: #1f6ddc;
    }

    .btn.neutral {
      background: #f3f4f6;
      color: #374151;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.12);
    }

    .btn:disabled {
      cursor: not-allowed;
      opacity: 0.6;
      transform: none;
    }

    #status {
      color: var(--muted);
      font-size: 0.95rem;
      min-height: 22px;
    }

    #news-container {
      display: grid;
      gap: 16px;
    }

    .news-card {
      background: var(--card);
      border: 1px solid #e5e7eb;
      border-radius: 14px;
      box-shadow: 0 10px 20px rgba(15, 23, 42, 0.1);
      overflow: hidden;
      transform: translateY(0);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      display: grid;
      grid-template-columns: 1fr;
      animation: fadeInUp 0.35s ease;
    }

    .news-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 28px rgba(15, 23, 42, 0.16);
    }

    .news-image {
      width: 100%;
      height: 210px;
      object-fit: cover;
      border-bottom: 1px solid #e5e7eb;
      background: #f3f4f6;
    }

    .news-content {
      padding: 18px 18px 16px;
      display: grid;
      gap: 8px;
    }

    .news-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.86rem;
      color: #9ca3af;
      margin-top: 4px;
    }

    .news-source {
      width: fit-content;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      font-size: 0.78rem;
      border-radius: 999px;
      padding: 5px 10px;
    }

    .news-title {
      font-size: 1.08rem;
      font-weight: 700;
      color: #111827;
      line-height: 1.35;
    }

    .news-title a {
      text-decoration: none;
      color: inherit;
    }

    .news-title a:hover {
      color: var(--accent);
    }

    .news-desc {
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }

    .error-card {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 12px;
      padding: 14px 16px;
      color: #b91c1c;
      font-size: 0.94rem;
      line-height: 1.5;
    }

    .hint {
      font-size: 0.9rem;
      color: #6b7280;
    }

    .label-small {
      font-size: 0.83rem;
      color: var(--muted);
      margin-left: 4px;
      opacity: 0.95;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      body { padding: 16px 10px 20px; }
      .hero { padding: 18px 14px; }
      .news-card { border-radius: 12px; }
      .news-image { height: 160px; }
    }
  </style>
</head>
<body>
  <section class="page">
    <article class="hero">
      <h1>📰 What is New?</h1>
      <p>اكتشف أحدث 10 أخبار بالعربي من GNews API مع دعم بروكسي وواجهة حديثة.</p>
      <div class="actions">
        <button id="fetchBtn" class="btn primary" type="button">
          🔍 جلب الأخبار
        </button>
        <button id="clearBtn" class="btn neutral" type="button">
          ♻️ مسح العرض
        </button>
      </div>
      <p id="status"></p>
      <p class="hint">
        رابط API: <strong><span id="apiHint">غير مفعّل</span></strong>
      </p>
    </article>

    <section id="news-container"></section>
  </section>

  <script>
    const API_KEY = "55e30d5c653ea217c8bc9d69e4225099"; // عدل لمفتاحك الخاص
    const PROXY_URL = "https://cors.bridged.cc/";
    const ENDPOINT = "https://gnews.io/api/v4/top-headlines?lang=ar&max=10&token=";
    const fetchBtn = document.getElementById("fetchBtn");
    const clearBtn = document.getElementById("clearBtn");
    const statusEl = document.getElementById("status");
    const newsContainer = document.getElementById("news-container");
    const apiHint = document.getElementById("apiHint");

    function setStatus(text, color = "") {
      statusEl.textContent = text;
      statusEl.style.color = color || "var(--muted)";
    }

    const formatTimeAgo = date => {
      if (!date || Number.isNaN(date.getTime())) return "غير متاح";
      const diff = Math.floor((Date.now() - date.getTime()) / 60000);
      if (diff < 1) return "الآن";
      if (diff < 60) return `منذ ${diff} دقيقة`;
      const hours = Math.floor(diff / 60);
      if (hours < 24) return `منذ ${hours} ساعة`;
      return `منذ ${Math.floor(hours / 24)} يوم`;
    };

    async function fetchNews() {
      fetchBtn.disabled = true;
      clearBtn.disabled = true;
      setStatus("⏳ جارية عملية جلب الأخبار...");
      newsContainer.innerHTML = "";
      apiHint.textContent = API_KEY ? "مفعّل" : "غير مفعّل";

      try {
        if (!API_KEY || API_KEY.trim().length < 10) {
          throw new Error("API Key غير صالح، يرجى ضبط المفتاح في الكود.");
        }
        const url = `${PROXY_URL}${encodeURIComponent(ENDPOINT + API_KEY)}`;
        const response = await fetch(url);
        const raw = await response.text();

        if (!response.ok) {
          let errorText = raw;
          try { const parsed = JSON.parse(raw); errorText = parsed.message || JSON.stringify(parsed); } catch {}
          throw new Error(`HTTP ${response.status} - ${errorText}`);
        }

        const data = JSON.parse(raw);
        if (!Array.isArray(data.articles)) {
          throw new Error(data.message || "الاستجابة غير متوقعة من API");
        }
        if (data.articles.length === 0) {
          throw new Error("لا توجد أخبار حالياً، حاول لاحقاً.");
        }

        setStatus(`✅ تم جلب ${data.articles.length} أخبار بنجاح.`, "var(--success)");
        data.articles.forEach((item, idx) => {
          const card = document.createElement("article");
          card.className = "news-card";
          card.style.animationDelay = `${idx * 0.07}s`;

          const img = item.image
            ? `<img class="news-image" src="${item.image}" alt="صورة الخبر" onerror="this.style.display='none'">`
            : "";
          const title = item.title || "بدون عنوان";
          const desc = item.description ? item.description : "لا يوجد وصف متاح.";
          const source = item.source?.name || "مصدر غير معروف";
          const dateText = item.publishedAt ? formatTimeAgo(new Date(item.publishedAt)) : "غير متاح";

          card.innerHTML = `
            ${img}
            <div class="news-content">
              <span class="news-source">🌐 ${source}</span>
              <h2 class="news-title">
                <a href="${item.url || '#'}" target="_blank" rel="noopener noreferrer">${title}</a>
              </h2>
              <p class="news-desc">${desc}</p>
              <div class="news-meta">
                <span>🕐 ${dateText}</span>
                <span><span class="label-small">#{idx + 1}</span></span>
              </div>
            </div>
          `;
          newsContainer.appendChild(card);
        });
      } catch (error) {
        newsContainer.innerHTML = `<div class="error-card">❌ ${error.message}</div>`;
        setStatus("فشل في جلب الأخبار", "var(--danger)");
      } finally {
        fetchBtn.disabled = false;
        clearBtn.disabled = false;
      }
    }

    clearBtn.addEventListener("click", () => {
      newsContainer.innerHTML = "";
      setStatus("", "");
      apiHint.textContent = API_KEY ? "مفعّل" : "غير مفعّل";
    });

    fetchBtn.addEventListener("click", fetchNews);
  </script>
</body>
</html>
