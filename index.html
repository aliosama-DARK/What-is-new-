<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What is New?</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: #d1d5db;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #1f2937;
      margin-bottom: 10px;
    }

    p.subtitle {
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    #fetchBtn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(59,130,246,0.4);
    }

    #fetchBtn:hover { background-color: #2563eb; transform: scale(1.05); }
    #fetchBtn:disabled { background-color: #93c5fd; cursor: not-allowed; transform: none; }

    #status {
      margin-top: 15px;
      color: #374151;
      font-size: 0.9rem;
      min-height: 20px;
    }

    #news-container {
      margin-top: 20px;
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .news-card {
      background: white;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s;
      border-right: 5px solid #3b82f6;
    }

    .news-card:hover { transform: translateY(-3px); }

    .news-source {
      font-size: 0.75rem;
      color: white;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .news-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .news-title a {
      text-decoration: none;
      color: inherit;
    }

    .news-title a:hover { color: #2563eb; }

    .news-meta { font-size: 0.8rem; color: #9ca3af; }

    .error-card {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      border-radius: 12px;
      padding: 16px 20px;
      color: #991b1b;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

  <h1>📰 What is New?</h1>
  <p class="subtitle">أحدث الأخبار من BBC • Reuters • Google News</p>

  <button id="fetchBtn" onclick="fetchNews()">🔍 What is New?</button>
  <p id="status"></p>
  <div id="news-container"></div>

  <script>
    // ✅ CORS Proxy بديل موثوق
    const PROXY = "https://corsproxy.io/?";

    const SOURCES = [
      {
        name: "BBC News",
        url: "https://feeds.bbci.co.uk/news/world/rss.xml",
        color: "#b91c1c"
      },
      {
        name: "Google News",
        url: "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en",
        color: "#16a34a"
      },
      {
        name: "Al Jazeera",
        url: "https://www.aljazeera.com/xml/rss/all.xml",
        color: "#92400e"
      }
    ];

    // ✅ تحليل RSS بدون مكتبة خارجية
    function parseRSS(xmlText, sourceName, sourceColor) {
      const parser = new DOMParser();
      const xml = parser.parseFromString(xmlText, "text/xml");
      const items = xml.querySelectorAll("item");
      const result = [];

      items.forEach(item => {
        const title = item.querySelector("title")?.textContent?.trim();
        const link  = item.querySelector("link")?.textContent?.trim()
                   || item.querySelector("link")?.getAttribute("href")?.trim();
        const pubDate = item.querySelector("pubDate")?.textContent?.trim();

        if (title && link) {
          result.push({
            title,
            link,
            pubDate: pubDate ? new Date(pubDate) : new Date(0),
            source: sourceName,
            color: sourceColor
          });
        }
      });

      return result;
    }

    async function fetchFromSource(source) {
      const url = PROXY + encodeURIComponent(source.url);
      const res = await fetch(url);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const text = await res.text();
      return parseRSS(text, source.name, source.color);
    }

    async function fetchNews() {
      const btn       = document.getElementById("fetchBtn");
      const status    = document.getElementById("status");
      const container = document.getElementById("news-container");

      btn.disabled    = true;
      btn.textContent = "⏳ جاري التحميل...";
      status.textContent = "";
      container.innerHTML = "";

      // ✅ جلب كل المصادر في نفس الوقت (Promise.allSettled)
      const results = await Promise.allSettled(
        SOURCES.map(s => fetchFromSource(s))
      );

      let allNews = [];
      let failedSources = [];

      results.forEach((result, i) => {
        if (result.status === "fulfilled") {
          allNews = allNews.concat(result.value);
        } else {
          failedSources.push(SOURCES[i].name);
          console.warn(`❌ ${SOURCES[i].name}:`, result.reason);
        }
      });

      // ✅ ترتيب من الأحدث بدون فلترة
      allNews.sort((a, b) => b.pubDate - a.pubDate);
      const top5 = allNews.slice(0, 5);

      if (top5.length === 0) {
        container.innerHTML = `
          <div class="error-card">
            😕 لم يتم جلب أي أخبار. تحقق من اتصالك بالإنترنت وحاول مرة أخرى.
          </div>`;
        status.textContent = "❌ فشل جلب الأخبار";
      } else {
        top5.forEach(news => {
          const card = document.createElement("div");
          card.className = "news-card";
          card.style.borderRightColor = news.color;
          card.innerHTML = `
            <span class="news-source" style="background-color:${news.color}">
              ${news.source}
            </span>
            <div class="news-title">
              <a href="${news.link}" target="_blank" rel="noopener">${news.title}</a>
            </div>
            <div class="news-meta">🕐 ${getTimeAgo(news.pubDate)}</div>
          `;
          container.appendChild(card);
        });

        const failMsg = failedSources.length
          ? ` | ⚠️ فشل: ${failedSources.join(", ")}`
          : "";
        status.textContent = `✅ أحدث ${top5.length} أخبار${failMsg}`;
      }

      btn.disabled    = false;
      btn.textContent = "🔄 تحديث الأخبار";
    }

    function getTimeAgo(date) {
      const diff = Math.floor((new Date() - date) / 60000);
      if (diff < 1)   return "الآن";
      if (diff < 60)  return `منذ ${diff} دقيقة`;
      const hours = Math.floor(diff / 60);
      if (hours < 24) return `منذ ${hours} ساعة`;
      const days = Math.floor(hours / 24);
      return `منذ ${days} يوم`;
    }
  </script>

</body>
</html>
