<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | النسخة النهائية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1a1a1a;
            --accent: #60a5fa;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #2d2d2d;
            --important-red: #ff3e3e; 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 900px; margin: 0 auto; text-align: center; }

        header { margin-bottom: 50px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
        header h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }

        #fetchBtn {
            background-color: transparent; color: var(--text-main);
            border: 2px solid var(--text-main); padding: 12px 40px; font-size: 1rem;
            font-weight: 800; border-radius: 50px; cursor: pointer;
            transition: 0.3s; margin-bottom: 40px;
        }
        #fetchBtn:hover { background-color: var(--text-main); color: #000; }

        #news-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 25px;
            text-align: right;
        }

        .card {
            background: var(--card-bg); padding: 30px;
            border-right: 4px solid var(--border);
            transition: 0.3s;
            position: relative;
        }

        /* تمييز الخبر السياسي والاقتصادي */
        .card.important {
            border-right: 6px solid var(--important-red);
            background: #1e1414; 
        }

        .card-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
        .card-title a { text-decoration: none; color: inherit; transition: 0.2s; }
        
        /* تلوين عنوان الخبر الهام */
        .important .card-title a { color: var(--important-red); }
        .card-title a:hover { color: var(--accent) !important; text-decoration: underline; }
        
        .card-desc { color: var(--text-dim); font-size: 1.05rem; margin-bottom: 20px; }

        /* منطقة المصدر والرابط */
        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border);
            padding-top: 15px;
            font-size: 0.85rem;
        }

        .source-link {
            background: var(--border);
            color: var(--text-main);
            padding: 5px 15px;
            text-decoration: none;
            border-radius: 4px;
            transition: 0.3s;
        }
        .source-link:hover { background: var(--accent); color: white; }

        .important .badge {
            background: var(--important-red); color: white;
            padding: 2px 10px; border-radius: 4px; font-size: 0.75rem;
            margin-left: 10px; vertical-align: middle;
        }

        .time { color: var(--text-dim); }

        @media (max-width: 768px) {
            header h1 { font-size: 2.2rem; }
            .card-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
    </header>

    <button id="fetchBtn" onclick="getFreeNews()">🔄 تحديث النشرة الآن</button>
    <div id="news-grid"></div>
</div>

<script>
    async function getFreeNews() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");

        btn.disabled = true;
        btn.innerText = "رجاء الانتظار...";
        grid.innerHTML = "";

        const rssUrl = "https://www.aljazeera.net/aljazeerarss/a7c186be-1baa-4bd4-9d80-a23915434110/281631e3-9974-4723-8874-8adca3ef6948";
        const finalUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.status === "ok") {
                data.items.forEach(item => {
                    const isImportant = /سياسة|اقتصاد|حرب|ميزانية|دولار|اتفاق|نفط|غزة|لبنان|قمة|احتلال|وزير|تضخم|برلمان/.test(item.title + item.description);
                    
                    const card = `
                        <div class="card ${isImportant ? 'important' : ''}">
                            <div class="card-body">
                                <h3 class="card-title">
                                    ${isImportant ? '<span class="badge">أخبار الساعة</span>' : ''}
                                    <a href="${item.link}" target="_blank">${item.title}</a>
                                </h3>
                                <p class="card-desc">${cleanDescription(item.description)}</p>
                                
                                <div class="card-meta">
                                    <span class="time">⏱️ ${new Date(item.pubDate).toLocaleTimeString('ar-EG')}</span>
                                    <a href="${item.link}" target="_blank" class="source-link">اقرأ الخبر من المصدر (الجزيرة) ←</a>
                                </div>
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                });
            }
        } catch (error) {
            grid.innerHTML = `<p style="padding:40px">عذراً، لم نتمكن من جلب الأخبار حالياً.</p>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 تحديث النشرة الآن";
        }
    }

    function cleanDescription(text) {
        let div = document.createElement("div");
        div.innerHTML = text;
        let p = (div.textContent || div.innerText || "").trim();
        return p.length > 200 ? p.substring(0, 200) + "..." : p;
    }

    window.onload = getFreeNews;
</script>

</body>
</html>
