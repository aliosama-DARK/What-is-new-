<script>
  // ضع المفتاح الجديد هنا
  const API_KEY = "NEW_API_KEY_HERE";

  // بروكسي مجاني/خاص (لاستعمالك، يفترض أن يكون آمنًا)
  const PROXY_URL = "https://api.allorigins.win/raw?url=";
  // بدائل شائعة:
  // https://cors-anywhere.herokuapp.com/
  // https://cors.bridged.cc/
  // أو سيرفرك الخاص: https://your-proxy.example.com/?u=

  async function fetchNews() {
    const btn = document.getElementById("fetchBtn");
    const status = document.getElementById("status");
    const container = document.getElementById("news-container");

    btn.disabled = true;
    btn.innerHTML = "⏳ جاري البحث...";
    container.innerHTML = "";

    try {
      const urlBase = `https://gnews.io/api/v4/top-headlines?lang=ar&max=10&apikey=${API_KEY}`;
      const url = `${PROXY_URL}${encodeURIComponent(urlBase)}`;
      const res = await fetch(url);
      const data = await res.json();

      if (!res.ok) {
        throw new Error(data.errors?.[0] || data.message || "فشل الاتصال");
      }

      if (!data.articles?.length) {
        container.innerHTML = `<div class="error-card">😕 لا توجد أخبار جديدة حالياً.</div>`;
      } else {
        data.articles.forEach((article, index) => {
          const card = document.createElement("div");
          card.className = "news-card";
          card.style.animationDelay = `${index * 0.1}s`;
          card.innerHTML = `
            ${article.image ? `<img class="news-image" src="${article.image}" alt="news">` : ""}
            <div class="news-content">
              <span class="news-source">📌 ${article.source.name}</span>
              <h3 class="news-title">
                <a href="${article.url}" target="_blank">${article.title}</a>
              </h3>
              <p class="news-desc">${article.description || "لا يوجد وصف متاح لهذا الخبر."}</p>
              <div class="news-meta">
                <span>🗓️ ${new Date(article.publishedAt).toLocaleDateString('ar-EG')}</span>
                <span>🕐 ${getTimeAgo(new Date(article.publishedAt))}</span>
              </div>
            </div>
          `;
          container.appendChild(card);
        });

        status.textContent = `✅ تم تحديث الأخبار بنجاح (10 أخبار)`;
      }
    } catch (err) {
      container.innerHTML = `<div class="error-card">❌ خطأ: ${err.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.innerHTML = "🔄 تحديث القائمة";
    }
  }

  function getTimeAgo(date) {
    const diff = Math.floor((new Date() - date) / 60000);
    if (diff < 1) return "الآن";
    if (diff < 60) return `منذ ${diff} دقيقة`;
    const hours = Math.floor(diff / 60);
    if (hours < 24) return `منذ ${hours} ساعة`;
    return `منذ ${Math.floor(hours / 24)} يوم`;
  }
</script>
