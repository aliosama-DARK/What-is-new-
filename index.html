<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | Ultra Dark</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --accent: #8b5cf6;
            --text: #e5e7eb; --gray: #9ca3af; --border: #333;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text); padding: 50px 20px; }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }
        h1 { font-size: 3.5rem; font-weight: 900; margin-bottom: 5px; letter-spacing: -1px; }
        .desc { color: var(--gray); margin-bottom: 40px; }

        #fetchBtn {
            background-color: var(--text); color: #000; border: none;
            padding: 16px 50px; font-size: 1.1rem; font-weight: 800;
            border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        #fetchBtn:hover { background-color: var(--accent); color: #fff; }
        #fetchBtn:disabled { background-color: #333; color: #666; cursor: not-allowed; }

        #news-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px; margin-top: 50px;
        }
        .card {
            background: var(--card); border-radius: 0; border: 1px solid var(--border);
            text-align: right; overflow: hidden; transition: 0.3s;
            display: flex; flex-direction: column;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-5px); }
        .card-img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(50%); }
        .card:hover .card-img { filter: grayscale(0%); }
        .card-body { padding: 25px; flex-grow: 1; }
        .card-source { color: var(--accent); font-size: 0.8rem; font-weight: 700; margin-bottom: 10px; display: block; }
        .card-title { font-size: 1.2rem; line-height: 1.5; font-weight: 700; }
        .card-title a { text-decoration: none; color: inherit; }
        .card-footer { padding: 15px 25px; border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--gray); }
    </style>
</head>
<body>

<div class="container">
    <h1>What is New?</h1>
    <p class="desc">تغطية حية لأهم أحداث العالم بتصميم رمادي داكن</p>
    <button id="fetchBtn" onclick="forceFetch()">🔄 تحديث الأخبار الآن</button>
    <div id="news-grid"></div>
</div>

<script>
    // 🕵️ قائمة المفاتيح للتدوير الصامت
    const vault = [
        "ac079469e54d30c5980004940f504651",
        "55e30d5c653ea217c8bc9d69e4225099",
        "ac079469e54d30c5980004940f504651" 
    ];
    let activeIndex = 0;

    async function forceFetch() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");
        btn.disabled = true;
        btn.innerText = "رجاء الانتظار...";
        grid.innerHTML = "";

        let status = false;

        // محاولة اختراق الحواجز باستخدام تدوير المفاتيح
        for (let attempt = 0; attempt < vault.length; attempt++) {
            const key = vault[activeIndex % vault.length];
            // رابط مخادع يحتوي على قيم متغيرة لمنع الكاش
            const rawUrl = `https://gnews.io/api/v4/top-headlines?category=general&lang=ar&max=10&apikey=${key}&hash=${Math.random()}`;
            
            // 🚀 استخدام وسيط كسر الحماية الاحترافي
            const bypassUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(rawUrl)}&timestamp=${Date.now()}`;

            try {
                const response = await fetch(bypassUrl);
                const data = await response.json();
                const payload = JSON.parse(data.contents);

                if (payload.articles && payload.articles.length > 0) {
                    draw(payload.articles);
                    status = true;
                    break; 
                }
            } catch (e) {
                console.log("Switching Key...");
                activeIndex++; // تغيير المفتاح فوراً عند أي فشل
            }
        }

        if (!status) {
            grid.innerHTML = `<p style="padding:50px; grid-column:1/-1">عذراً، لم نتمكن من جلب الأخبار. يرجى المحاولة لاحقاً.</p>`;
        }

        btn.disabled = false;
        btn.innerText = "🔄 تحديث الأخبار الآن";
    }

    function draw(items) {
        const grid = document.getElementById("news-grid");
        items.forEach(item => {
            grid.innerHTML += `
                <div class="card">
                    <img class="card-img" src="${item.image || 'https://via.placeholder.com/400x200?text=News'}" alt="img">
                    <div class="card-body">
                        <span class="card-source">${item.source.name}</span>
                        <h3 class="card-title"><a href="${item.url}" target="_blank">${item.title}</a></h3>
                    </div>
                    <div class="card-footer">📍 تحديث مباشر</div>
                </div>`;
        });
    }

    window.onload = forceFetch;
</script>

</body>
</html>
