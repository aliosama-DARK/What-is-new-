<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | النسخة الرمادية الاحترافية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 التصميم الرمادي (Slate & Silver) */
        :root {
            --bg-page: #f1f5f9;
            --bg-card: #ffffff;
            --gray-dark: #1e293b;
            --gray-medium: #475569;
            --gray-light: #94a3b8;
            --accent: #334155; /* رمادي صخري غامق */
            --border: #e2e8f0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { 
            background-color: var(--bg-page); 
            color: var(--gray-dark);
            padding: 40px 20px;
        }

        .header { text-align: center; margin-bottom: 40px; }
        h1 { font-size: 3rem; font-weight: 900; color: var(--gray-dark); }
        .subtitle { color: var(--gray-medium); font-size: 1.1rem; }

        /* منطقة الزر */
        .controls { text-align: center; margin-bottom: 50px; }
        #fetchBtn {
            background-color: var(--accent);
            color: white; border: none; padding: 18px 45px;
            font-size: 1.1rem; font-weight: 700; border-radius: 12px;
            cursor: pointer; transition: 0.3s;
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }
        #fetchBtn:hover { background-color: #0f172a; transform: translateY(-2px); }
        #fetchBtn:disabled { background-color: #94a3b8; cursor: wait; }

        /* شبكة الأخبار - 3 أعمدة احترافية */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .news-card {
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            transition: 0.4s;
            animation: slideIn 0.5s ease-out forwards;
        }
        .news-card:hover { transform: translateY(-8px); box-shadow: 0 20px 25px rgba(0,0,0,0.05); }

        .news-img { width: 100%; height: 210px; object-fit: cover; background: #cbd5e1; }

        .news-content { padding: 25px; flex-grow: 1; }
        .source-tag { font-size: 0.8rem; color: var(--gray-medium); font-weight: 700; display: block; margin-bottom: 10px; }
        .news-title { font-size: 1.2rem; font-weight: 700; line-height: 1.5; margin-bottom: 15px; }
        .news-title a { text-decoration: none; color: inherit; transition: 0.2s; }
        .news-title a:hover { color: #64748b; }

        .news-footer { 
            padding: 15px 25px; background: #f8fafc; 
            border-top: 1px solid var(--border); 
            font-size: 0.8rem; color: var(--gray-light);
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .error-box { grid-column: 1/-1; background: #fff; padding: 30px; border-radius: 15px; border: 2px dashed #f87171; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>What is New?</h1>
        <p class="subtitle">أحدث الأخبار العالمية بتصميم رمادي عصري</p>
    </div>

    <div class="controls">
        <button id="fetchBtn" onclick="fetchWorldNews()">🔄 تحديث الأخبار الآن</button>
    </div>

    <div id="news-grid">
        </div>

    <script>
        // مفتاحك
        const API_KEY = "55e30d5c653ea217c8bc9d69e4225099";

        async function fetchWorldNews() {
            const grid = document.getElementById("news-grid");
            const btn = document.getElementById("fetchBtn");

            btn.disabled = true;
            btn.innerHTML = "⏳ جاري جلب أحدث القصص...";
            grid.innerHTML = ""; // مسح الأخبار القديمة فوراً

            try {
                // 🕵️ الخدعة: إضافة timestamp (وقت حالي) للرابط لمنع الكاش نهائياً
                const timestamp = new Date().getTime();
                const targetUrl = `https://gnews.io/api/v4/top-headlines?category=general&lang=ar&max=10&apikey=${API_KEY}&t=${timestamp}`;
                
                // استخدام الوسيط المخادع
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;

                const response = await fetch(proxyUrl);
                const result = await response.json();
                const data = JSON.parse(result.contents);

                if (data.articles && data.articles.length > 0) {
                    data.articles.forEach((news, index) => {
                        const card = document.createElement("div");
                        card.className = "news-card";
                        card.style.animationDelay = (index * 0.1) + "s";
                        card.innerHTML = `
                            ${news.image ? `<img src="${news.image}" class="news-img" alt="img">` : `<div class="news-img" style="display:flex;align-items:center;justify-content:center">لا يوجد صورة</div>`}
                            <div class="news-content">
                                <span class="source-tag">📍 ${news.source.name}</span>
                                <h2 class="news-title"><a href="${news.url}" target="_blank">${news.title}</a></h2>
                            </div>
                            <div class="news-footer">
                                🕐 نُشر في: ${new Date(news.publishedAt).toLocaleDateString('ar-EG')}
                            </div>
                        `;
                        grid.appendChild(card);
                    });
                } else {
                    throw new Error("لم نجد أخباراً جديدة حالياً.");
                }

            } catch (err) {
                grid.innerHTML = `<div class="error-box"><h3>❌ فشل التحديث</h3><p>${err.message}</p></div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = "🔄 تحديث الأخبار الآن";
            }
        }

        // تشغيل تلقائي عند الفتح
        window.onload = fetchWorldNews;
    </script>
</body>
</html>
