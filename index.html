<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | 2026 Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --main-color: #007bff;
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #333;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { background-color: var(--bg-color); padding: 50px 20px; }

        .container { max-width: 1100px; margin: 0 auto; text-align: center; }

        h1 { font-size: 3.5rem; font-weight: 900; color: #222; margin-bottom: 10px; }
        .description { color: #777; margin-bottom: 40px; }

        /* زر فخم وجديد */
        #fetchBtn {
            background: linear-gradient(45deg, var(--main-color), #0056b3);
            color: white; border: none; padding: 15px 40px;
            font-size: 1.2rem; font-weight: 700; border-radius: 50px;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,123,255,0.3);
        }
        #fetchBtn:hover { transform: scale(1.05); box-shadow: 0 15px 25px rgba(0,123,255,0.4); }

        /* توزيع الأخبار (تغيير جذري في الشكل) */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px; margin-top: 50px;
        }

        .card {
            background: var(--card-bg); border-radius: 20px; overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05); transition: 0.4s;
            display: flex; flex-direction: column; text-align: right;
        }
        .card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }

        .card-img { width: 100%; height: 200px; object-fit: cover; }

        .card-body { padding: 20px; flex-grow: 1; }
        .card-source { font-size: 0.8rem; color: var(--main-color); font-weight: 700; }
        .card-title { font-size: 1.1rem; margin: 10px 0; line-height: 1.5; }
        .card-title a { text-decoration: none; color: var(--text-color); }

        .card-footer { padding: 15px 20px; border-top: 1px solid #eee; font-size: 0.8rem; color: #999; }

        .loader { font-size: 1.5rem; color: var(--main-color); margin-top: 20px; display: none; }
        .error-msg { background: #ffeded; color: #d9534f; padding: 20px; border-radius: 10px; grid-column: 1/-1; }
    </style>
</head>
<body>

<div class="container">
    <h1>What is New? 📰</h1>
    <p class="description">بوابتك الذكية لأحدث الأخبار العالمية بمظهر عصري</p>
    
    <button id="fetchBtn" onclick="getNews()">🚀 استكشف الآن</button>
    <div id="loader" class="loader">جاري سحب الأخبار من الأقمار الصناعية... 🛰️</div>

    <div id="news-grid">
        </div>
</div>

<script>
    const API_KEY = "55e30d5c653ea217c8bc9d69e4225099";

    async function getNews() {
        const grid = document.getElementById("news-grid");
        const loader = document.getElementById("loader");
        const btn = document.getElementById("fetchBtn");

        grid.innerHTML = "";
        loader.style.display = "block";
        btn.disabled = true;

        try {
            const url = `https://gnews.io/api/v4/top-headlines?category=general&lang=ar&max=10&apikey=${API_KEY}`;
            
            // الحل التقني النهائي: استخدام وسيط AllOrigins بطريقة أكثر أماناً
            const finalUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
            
            const response = await fetch(finalUrl);
            const wrapper = await response.json();
            const data = JSON.parse(wrapper.contents);

            if (data.articles && data.articles.length > 0) {
                data.articles.forEach(article => {
                    const card = `
                        <div class="card">
                            <img class="card-img" src="${article.image || 'https://via.placeholder.com/400x200?text=News'}" alt="img">
                            <div class="card-body">
                                <span class="card-source">📍 ${article.source.name}</span>
                                <h3 class="card-title"><a href="${article.url}" target="_blank">${article.title}</a></h3>
                            </div>
                            <div class="card-footer">
                                🕐 نشر في: ${new Date(article.publishedAt).toLocaleDateString('ar-EG')}
                            </div>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
            } else {
                throw new Error("لم نجد أخباراً، قد يكون المفتاح انتهى.");
            }
        } catch (error) {
            grid.innerHTML = `<div class="error-msg">❌ خطأ في الاتصال: ${error.message} <br> جرب فتح الموقع من متصفح آخر أو تأكد من جودة الإنترنت.</div>`;
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
