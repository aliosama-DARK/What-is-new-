<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | النسخة السياسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #60a5fa;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
            --border: #2e2e2e;
            --important-red: #ff4d4d; /* اللون الأحمر للأخبار السياسية */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }

        header h1 { font-size: 3rem; font-weight: 900; margin-bottom: 30px; }

        #fetchBtn {
            background-color: var(--text-main); color: #000;
            border: none; padding: 15px 45px; font-size: 1.1rem;
            font-weight: 800; border-radius: 6px; cursor: pointer;
            transition: 0.3s; margin-bottom: 50px;
        }
        #fetchBtn:hover { background-color: var(--accent); color: #fff; }

        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            grid-auto-flow: dense;
        }

        .card {
            background: var(--card-bg); border-radius: 12px;
            overflow: hidden; border: 1px solid var(--border);
            transition: 0.3s; text-align: right; display: flex; flex-direction: column;
        }

        /* تمييز الخبر السياسي والاقتصادي */
        .card.important {
            grid-column: span 2; /* مساحة أكبر */
            border-color: var(--important-red);
            box-shadow: 0 0 15px rgba(255, 77, 77, 0.1);
        }

        .card:hover { transform: translateY(-5px); }

        .card-img {
            width: 100%; height: 200px; object-fit: cover;
            background: #252525; border-bottom: 1px solid var(--border);
        }
        .card.important .card-img { height: 350px; }

        .card-body { padding: 25px; flex-grow: 1; }
        
        /* تلوين العنوان بالأحمر للخبر الهام */
        .card-title { font-size: 1.2rem; line-height: 1.6; font-weight: 700; }
        .important .card-title a { color: var(--important-red); }
        .card-title a { text-decoration: none; color: inherit; }
        
        .card-desc { color: var(--text-dim); font-size: 0.95rem; margin-top: 15px; line-height: 1.6; }
        .card-footer { padding: 15px 25px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--accent); }

        @media (max-width: 768px) {
            .card.important { grid-column: span 1; }
            .card.important .card-img { height: 220px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
    </header>

    <button id="fetchBtn" onclick="getFreeNews()">🔄 تحديث الأخبار الآن</button>
    <div id="news-grid"></div>
</div>

<script>
    async function getFreeNews() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");

        btn.disabled = true;
        btn.innerText = "رجاء الانتظار...";
        grid.innerHTML = "";

        const rssUrl = "https://www.aljazeera.net/aljazeerarss/a7c186be-1baa-4bd4-9d80-a23915434110/281631e3-9974-4723-8874-8adca3ef6948";
        const finalUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.status === "ok") {
                data.items.forEach(item => {
                    // فحص الكلمات المفتاحية للتمييز باللون الأحمر
                    const isImportant = /سياسة|اقتصاد|حرب|ميزانية|دولار|اتفاق|نفط|غزة|لبنان|قمة|احتلال|وزير/.test(item.title + item.description);
                    
                    // محاولة جلب الصورة من عدة مصادر داخل الـ RSS
                    let img = "https://images.unsplash.com/photo-1585829365234-78d2b50294a6?w=800&q=80"; // صورة افتراضية فخمة
                    if (item.enclosure && item.enclosure.link) img = item.enclosure.link;
                    else if (item.thumbnail) img = item.thumbnail;
                    else if (item.description.includes('<img')) {
                        const match = item.description.match(/<img[^>]+src="([^">]+)"/);
                        if (match) img = match[1];
                    }

                    const card = `
                        <div class="card ${isImportant ? 'important' : ''}">
                            <img class="card-img" src="${img}" onerror="this.src='https://via.placeholder.com/800x400?text=News'">
                            <div class="card-body">
                                <h3 class="card-title"><a href="${item.link}" target="_blank">${item.title}</a></h3>
                                <p class="card-desc">${cleanDescription(item.description)}</p>
                            </div>
                            <div class="card-footer">
                                ${isImportant ? '🛑 خبر عاجل | ' : ''} ⏱️ ${new Date(item.pubDate).toLocaleTimeString('ar-EG')}
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                });
            }
        } catch (error) {
            grid.innerHTML = `<div class="error-area">حدث خطأ، حاول مرة أخرى.</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 تحديث الأخبار الآن";
        }
    }

    function cleanDescription(text) {
        let div = document.createElement("div");
        div.innerHTML = text;
        return (div.textContent || div.innerText || "").substring(0, 150) + "...";
    }

    window.onload = getFreeNews;
</script>

</body>
</html>
