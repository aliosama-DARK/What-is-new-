<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | النسخة المطورة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 التصميم الرمادي الداكن الفخم */
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #60a5fa;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
            --border: #2e2e2e;
            --gold: #fbbf24; /* للأخبار الاقتصادية والسياسية */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; }

        .container { max-width: 1200px; margin: 0 auto; text-align: center; }

        header h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; letter-spacing: -1px; }
        header p { color: var(--text-dim); margin-bottom: 40px; }

        #fetchBtn {
            background-color: var(--text-main); color: #000;
            border: none; padding: 15px 45px; font-size: 1.1rem;
            font-weight: 800; border-radius: 6px; cursor: pointer;
            transition: 0.3s; margin-bottom: 50px;
        }
        #fetchBtn:hover { background-color: var(--accent); color: #fff; transform: scale(1.05); }

        /* شبكة الأخبار الذكية */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
            grid-auto-flow: dense; /* يجعل الكروت الكبيرة تملأ الفراغات */
        }

        .card {
            background: var(--card-bg); border-radius: 12px;
            overflow: hidden; border: 1px solid var(--border);
            transition: 0.3s; text-align: right; display: flex; flex-direction: column;
        }

        /* تمييز الأخبار المهمة */
        .card.featured {
            grid-column: span 2; /* تأخذ عرض عمودين */
            border-color: var(--gold);
        }

        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        /* تعديل الصور */
        .card-img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-bottom: 1px solid var(--border);
            background: #252525;
        }
        .card.featured .card-img {
            height: 350px; /* صورة أكبر للأخبار الهامة */
        }

        .card-body { padding: 25px; flex-grow: 1; }
        
        .tag {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: var(--border);
            color: var(--text-dim);
        }
        .featured .tag { background: var(--gold); color: #000; }

        .card-title { font-size: 1.2rem; line-height: 1.6; font-weight: 700; margin-bottom: 10px; }
        .featured .card-title { font-size: 1.6rem; }
        .card-title a { text-decoration: none; color: inherit; }
        
        .card-desc { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; }

        .card-footer { padding: 15px 25px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--accent); }

        @media (max-width: 768px) {
            .card.featured { grid-column: span 1; }
            .card.featured .card-img { height: 220px; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
        <p>نسخة المجلة | أخبار سياسية واقتصادية بالصور</p>
    </header>

    <button id="fetchBtn" onclick="getFreeNews()">🔄 تحديث الأخبار الآن</button>

    <div id="news-grid"></div>
</div>

<script>
    async function getFreeNews() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");

        btn.disabled = true;
        btn.innerText = "رجاء الانتظار...";
        grid.innerHTML = "";

        const rssUrl = "https://www.aljazeera.net/aljazeerarss/a7c186be-1baa-4bd4-9d80-a23915434110/281631e3-9974-4723-8874-8adca3ef6948";
        const finalUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.status === "ok") {
                data.items.forEach(item => {
                    // 1. تحديد أهمية الخبر (سياسة واقتصاد)
                    const isImportant = /سياسة|اقتصاد|حرب|ميزانية|دولار|اتفاق|نفط|غزة|قمة/.test(item.title + item.description);
                    
                    // 2. محاولة جلب الصورة الحقيقية
                    let imgUrl = "";
                    if (item.enclosure && item.enclosure.link) {
                        imgUrl = item.enclosure.link;
                    } else if (item.thumbnail) {
                        imgUrl = item.thumbnail;
                    } else {
                        // صورة احتياطية فخمة إذا لم تتوفر صورة للخبر
                        imgUrl = "https://images.unsplash.com/photo-1585829365234-78d2b50294a6?w=800&q=80";
                    }

                    const card = `
                        <div class="card ${isImportant ? 'featured' : ''}">
                            <img src="${imgUrl}" class="card-img" alt="news image" onerror="this.src='https://via.placeholder.com/800x400?text=News'">
                            <div class="card-body">
                                <span class="tag">${isImportant ? 'تحليل سياسي/اقتصادي' : 'أخبار عامة'}</span>
                                <h3 class="card-title"><a href="${item.link}" target="_blank">${item.title}</a></h3>
                                <p class="card-desc">${cleanDescription(item.description)}</p>
                            </div>
                            <div class="card-footer">
                                ⏱️ ${new Date(item.pubDate).toLocaleTimeString('ar-EG')} | الجزيرة نت
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                });
            } else {
                throw new Error();
            }
        } catch (error) {
            grid.innerHTML = `<div class="error-area">عذراً، حدث خطأ في جلب الأخبار. حاول مرة أخرى.</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 تحديث الأخبار الآن";
        }
    }

    function cleanDescription(text) {
        let div = document.createElement("div");
        div.innerHTML = text;
        let plainText = div.textContent || div.innerText || "";
        return plainText.length > 150 ? plainText.substring(0, 150) + "..." : plainText;
    }

    window.onload = getFreeNews;
</script>

</body>
</html>
