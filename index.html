<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | النسخة الحرة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 تصميم رمادي داكن فخم (Deep Slate) */
        :root {
            --bg: #121212;
            --card-bg: #1e1e1e;
            --accent: #60a5fa;
            --text-main: #e5e7eb;
            --text-dim: #9ca3af;
            --border: #2e2e2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; }

        .container { max-width: 1100px; margin: 0 auto; text-align: center; }

        header h1 { font-size: 3rem; font-weight: 900; margin-bottom: 10px; }
        header p { color: var(--text-dim); margin-bottom: 40px; }

        /* زر التحديث */
        #fetchBtn {
            background-color: var(--text-main); color: #000;
            border: none; padding: 15px 45px; font-size: 1.1rem;
            font-weight: 800; border-radius: 6px; cursor: pointer;
            transition: 0.3s; margin-bottom: 50px;
        }
        #fetchBtn:hover { background-color: var(--accent); color: #fff; }
        #fetchBtn:disabled { background-color: #333; color: #666; cursor: not-allowed; }

        /* شبكة الأخبار */
        #news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--card-bg); border-radius: 12px;
            overflow: hidden; border: 1px solid var(--border);
            transition: 0.3s; text-align: right; display: flex; flex-direction: column;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .card-body { padding: 25px; flex-grow: 1; }
        .card-title { font-size: 1.2rem; line-height: 1.6; font-weight: 700; }
        .card-title a { text-decoration: none; color: inherit; }
        
        .card-desc { color: var(--text-dim); font-size: 0.95rem; margin-top: 15px; line-height: 1.6; }

        .card-footer { padding: 15px 25px; background: rgba(255,255,255,0.02); border-top: 1px solid var(--border); font-size: 0.8rem; color: var(--accent); }

        .error-area { grid-column: 1/-1; padding: 50px; color: var(--text-dim); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
        <p>نسخة دائمة العمل - بدون قيود - بدون مفاتيح</p>
    </header>

    <button id="fetchBtn" onclick="getFreeNews()">🔄 تحديث الأخبار الآن</button>

    <div id="news-grid">
        </div>
</div>

<script>
    async function getFreeNews() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");

        btn.disabled = true;
        btn.innerText = "رجاء الانتظار...";
        grid.innerHTML = "";

        // 🔗 نستخدم رابط RSS الخاص بالجزيرة (مجاني للأبد)
        const rssUrl = "https://www.aljazeera.net/aljazeerarss/a7c186be-1baa-4bd4-9d80-a23915434110/281631e3-9974-4723-8874-8adca3ef6948";
        
        // محول RSS إلى JSON (وسيط مجاني لا يحتاج مفتاح)
        const finalUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.status === "ok") {
                data.items.forEach(item => {
                    // استخراج الصورة من المحتوى إذا لم تكن موجودة بشكل مباشر
                    let img = item.enclosure.link || item.thumbnail || "https://via.placeholder.com/400x200?text=News";
                    
                    const card = `
                        <div class="card">
                            <div class="card-body">
                                <h3 class="card-title"><a href="${item.link}" target="_blank">${item.title}</a></h3>
                                <p class="card-desc">${cleanDescription(item.description)}</p>
                            </div>
                            <div class="card-footer">
                                ⏱️ نُشر في: ${new Date(item.pubDate).toLocaleTimeString('ar-EG')}
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                });
            } else {
                throw new Error();
            }
        } catch (error) {
            grid.innerHTML = `<div class="error-area">عذراً، حدث خطأ في جلب الأخبار. حاول مرة أخرى.</div>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 تحديث الأخبار الآن";
        }
    }

    // تنظيف الوصف من أي كود HTML زائد
    function cleanDescription(text) {
        let div = document.createElement("div");
        div.innerHTML = text;
        let plainText = div.textContent || div.innerText || "";
        return plainText.substring(0, 120) + "...";
    }

    // تشغيل تلقائي عند الدخول
    window.onload = getFreeNews;
</script>

</body>
</html>
