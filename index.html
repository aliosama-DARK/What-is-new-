<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What is New?</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #d1d5db;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 2.5rem;
      color: #1f2937;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    p.subtitle {
      color: #6b7280;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }

    #fetchBtn {
      background-color: #3b82f6;
      color: white;
      border: none;
      padding: 14px 36px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
      box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
    }

    #fetchBtn:hover {
      background-color: #2563eb;
      transform: scale(1.05);
    }

    #fetchBtn:disabled {
      background-color: #93c5fd;
      cursor: not-allowed;
      transform: none;
    }

    #status {
      margin-top: 15px;
      color: #374151;
      font-size: 0.9rem;
    }

    /* ✅ بنر تنبيه "لا يوجد أخبار جديدة" */
    #old-news-banner {
      display: none;
      margin-top: 20px;
      background-color: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 12px;
      padding: 12px 20px;
      font-size: 0.95rem;
      color: #92400e;
      max-width: 750px;
      width: 100%;
      text-align: center;
    }

    #news-container {
      margin-top: 16px;
      width: 100%;
      max-width: 750px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .news-card {
      background: white;
      border-radius: 16px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      transition: transform 0.2s;
      border-right: 5px solid #3b82f6;
    }

    .news-card:hover {
      transform: translateY(-3px);
    }

    .news-source {
      font-size: 0.75rem;
      color: white;
      background-color: #3b82f6;
      padding: 3px 10px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    .news-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .news-title a {
      text-decoration: none;
      color: inherit;
    }

    .news-title a:hover {
      color: #2563eb;
    }

    .news-meta {
      font-size: 0.8rem;
      color: #9ca3af;
    }
  </style>
</head>
<body>

  <h1>📰 What is New?</h1>
  <p class="subtitle">أحدث الأخبار من BBC • Reuters • Google News — آخر 12 ساعة</p>

  <button id="fetchBtn" onclick="fetchNews()">🔍 What is New?</button>
  <p id="status"></p>

  <!-- ✅ بنر الأخبار القديمة -->
  <div id="old-news-banner">
    ⚠️ لا توجد أخبار جديدة خلال آخر 12 ساعة — يتم عرض أحدث الأخبار المتاحة
  </div>

  <div id="news-container"></div>

  <script>
    const SOURCES = [
      {
        name: "BBC News",
        url: "https://feeds.bbci.co.uk/news/world/rss.xml",
        color: "#b91c1c"
      },
      {
        name: "Reuters",
        url: "https://feeds.reuters.com/reuters/topNews",
        color: "#0369a1"
      },
      {
        name: "Google News",
        url: "https://news.google.com/rss?hl=en-US&gl=US&ceid=US:en",
        color: "#16a34a"
      }
    ];

    const RSS2JSON = "https://api.rss2json.com/v1/api.json?rss_url=";

    async function fetchNews() {
      const btn = document.getElementById("fetchBtn");
      const status = document.getElementById("status");
      const container = document.getElementById("news-container");
      const banner = document.getElementById("old-news-banner");

      btn.disabled = true;
      btn.textContent = "⏳ جاري التحميل...";
      status.textContent = "";
      container.innerHTML = "";
      banner.style.display = "none";

      const now = new Date();
      const twelveHoursAgo = new Date(now.getTime() - 12 * 60 * 60 * 1000);

      let allNews = [];
      let allOldNews = [];

      for (const source of SOURCES) {
        try {
          const res = await fetch(`${RSS2JSON}${encodeURIComponent(source.url)}&count=20`);
          const data = await res.json();

          if (data.status === "ok" && data.items) {
            data.items.forEach(item => {
              const pubDate = new Date(item.pubDate);
              const newsObj = {
                title: item.title,
                link: item.link,
                pubDate,
                source: source.name,
                color: source.color
              };

              if (pubDate >= twelveHoursAgo) {
                allNews.push(newsObj);      // ✅ أخبار جديدة
              } else {
                allOldNews.push(newsObj);   // 🗂️ أخبار قديمة
              }
            });
          }
        } catch (err) {
          console.warn(`فشل جلب أخبار ${source.name}:`, err);
        }
      }

      // ترتيب من الأحدث
      allNews.sort((a, b) => b.pubDate - a.pubDate);
      allOldNews.sort((a, b) => b.pubDate - a.pubDate);

      let finalNews = [];
      let isOld = false;

      if (allNews.length > 0) {
        // ✅ في أخبار جديدة
        finalNews = allNews.slice(0, 5);
      } else {
        // ⚠️ مافيش أخبار جديدة → اجيب القديمة
        finalNews = allOldNews.slice(0, 5);
        isOld = true;
      }

      if (finalNews.length === 0) {
        container.innerHTML = `<div style="text-align:center;background:white;border-radius:16px;padding:30px;color:#6b7280;">😕 لا توجد أخبار متاحة حالياً، حاول لاحقاً.</div>`;
      } else {
        // ✅ إظهار البنر لو الأخبار قديمة
        if (isOld) {
          banner.style.display = "block";
        }

        finalNews.forEach(news => {
          const timeAgo = getTimeAgo(news.pubDate);
          const card = document.createElement("div");
          card.className = "news-card";
          card.style.borderRightColor = news.color;
          card.innerHTML = `
            <span class="news-source" style="background-color:${news.color}">${news.source}</span>
            <div class="news-title">
              <a href="${news.link}" target="_blank" rel="noopener">${news.title}</a>
            </div>
            <div class="news-meta">🕐 ${timeAgo}</div>
          `;
          container.appendChild(card);
        });
      }

      status.textContent = isOld
        ? `📂 يتم عرض ${finalNews.length} خبر قديم`
        : `✅ تم جلب ${finalNews.length} خبر من آخر 12 ساعة`;

      btn.disabled = false;
      btn.textContent = "🔄 تحديث الأخبار";
    }

    function getTimeAgo(date) {
      const diff = Math.floor((new Date() - date) / 60000);
      if (diff < 60) return `منذ ${diff} دقيقة`;
      const hours = Math.floor(diff / 60);
      if (hours < 24) return `منذ ${hours} ساعة`;
      const days = Math.floor(hours / 24);
      return `منذ ${days} يوم`;
    }
  </script>

</body>
</html>
