<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What is New? | النسخة النصية الفخمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121212;
            --card-bg: #1a1a1a;
            --accent: #60a5fa;
            --text-main: #ffffff;
            --text-dim: #a1a1aa;
            --border: #2d2d2d;
            --important-red: #ff3e3e; /* الأحمر السياسي */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: 0 auto; text-align: center; }

        header { margin-bottom: 50px; border-bottom: 2px solid var(--border); padding-bottom: 20px; }
        header h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: -2px; }

        #fetchBtn {
            background-color: transparent; color: var(--text-main);
            border: 2px solid var(--text-main); padding: 12px 40px; font-size: 1rem;
            font-weight: 800; border-radius: 50px; cursor: pointer;
            transition: 0.3s; margin-bottom: 40px;
        }
        #fetchBtn:hover { background-color: var(--text-main); color: #000; }

        #news-grid {
            display: grid;
            grid-template-columns: 1fr; /* جعل الأخبار تحت بعضها بشكل أرتب */
            gap: 20px;
            text-align: right;
        }

        .card {
            background: var(--card-bg); padding: 30px;
            border-right: 4px solid var(--border); /* خط جانبي رمادي */
            transition: 0.3s;
        }

        /* تمييز الخبر السياسي والاقتصادي */
        .card.important {
            border-right: 6px solid var(--important-red); /* خط جانبي أحمر */
            background: #1e1414; /* خلفية تميل للاحمرار خفيف جداً */
        }

        .card-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 12px; }
        .card-title a { text-decoration: none; color: inherit; transition: 0.2s; }
        
        /* تلوين عنوان الخبر الهام */
        .important .card-title a { color: var(--important-red); font-size: 1.8rem; }
        .card-title a:hover { color: var(--accent); }
        
        .card-desc { color: var(--text-dim); font-size: 1rem; margin-bottom: 15px; max-width: 90% }
        .card-footer { font-size: 0.85rem; color: var(--accent); font-weight: 600; }

        .important .badge {
            background: var(--important-red); color: white;
            padding: 2px 10px; border-radius: 4px; font-size: 0.7rem;
            margin-left: 10px; vertical-align: middle;
        }

        @media (max-width: 768px) {
            header h1 { font-size: 2.5rem; }
            .important .card-title a { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>What is New?</h1>
    </header>

    <button id="fetchBtn" onclick="getFreeNews()">🔄 تحديث النشرة</button>
    <div id="news-grid"></div>
</div>

<script>
    async function getFreeNews() {
        const grid = document.getElementById("news-grid");
        const btn = document.getElementById("fetchBtn");

        btn.disabled = true;
        btn.innerText = "رجاء الانتظار...";
        grid.innerHTML = "";

        const rssUrl = "https://www.aljazeera.net/aljazeerarss/a7c186be-1baa-4bd4-9d80-a23915434110/281631e3-9974-4723-8874-8adca3ef6948";
        const finalUrl = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(rssUrl)}&t=${Date.now()}`;

        try {
            const response = await fetch(finalUrl);
            const data = await response.json();

            if (data.status === "ok") {
                data.items.forEach(item => {
                    // الكشف عن الأخبار الهامة (سياسة واقتصاد)
                    const isImportant = /سياسة|اقتصاد|حرب|ميزانية|دولار|اتفاق|نفط|غزة|لبنان|قمة|احتلال|وزير|تضخم/.test(item.title + item.description);
                    
                    const card = `
                        <div class="card ${isImportant ? 'important' : ''}">
                            <div class="card-body">
                                <h3 class="card-title">
                                    ${isImportant ? '<span class="badge">خبر هام</span>' : ''}
                                    <a href="${item.link}" target="_blank">${item.title}</a>
                                </h3>
                                <p class="card-desc">${cleanDescription(item.description)}</p>
                                <div class="card-footer">
                                    ⏱️ ${new Date(item.pubDate).toLocaleTimeString('ar-EG')} | المصدر: الجزيرة
                                </div>
                            </div>
                        </div>`;
                    grid.innerHTML += card;
                });
            }
        } catch (error) {
            grid.innerHTML = `<p style="padding:40px">فشل التحديث، يرجى المحاولة مرة أخرى.</p>`;
        } finally {
            btn.disabled = false;
            btn.innerText = "🔄 تحديث النشرة";
        }
    }

    function cleanDescription(text) {
        let div = document.createElement("div");
        div.innerHTML = text;
        let p = (div.textContent || div.innerText || "").trim();
        return p.substring(0, 180) + "...";
    }

    window.onload = getFreeNews;
</script>

</body>
</html>
